<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Photo Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0f1a;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #titlebar {
      padding: 8px 12px;
      font-size: 12px;
      color: #8b949e;
      background: #161b27;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
      /* ドラッグでウィンドウ移動できるようにする */
      -webkit-app-region: drag;
    }
    #img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
    }
    #photo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
    }
    #placeholder {
      color: #30363d;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="titlebar">—</div>
  <div id="img-wrap">
    <span id="placeholder">写真を選択してください</span>
    <img id="photo" src="" style="display:none" />
  </div>
  <script>
    const titlebar   = document.getElementById("titlebar");
    const photoEl    = document.getElementById("photo");
    const placeholder = document.getElementById("placeholder");

    window.photoApi.onShowPhoto(({ photoId, filename }) => {
      titlebar.textContent = filename;
      document.title       = filename;
      photoEl.src          = `photo://${photoId}`;
      photoEl.style.display = "block";
      placeholder.style.display = "none";
    });
  </script>
</body>
</html>
